server {
    listen 80;
    listen 443 ssl;
    server_name lensio.saifsiddiquee.qzz.io;

    root /var/www/html/public;
    index index.php index.html;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Laravel front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        fastcgi_read_timeout    300;
        fastcgi_buffer_size     16k;
        fastcgi_buffers         4 16k;
    }

    # Static assets — long cache, no PHP processing
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
        try_files   $uri =404;
    }

    # Vite build assets (hashed filenames — immutable)
    location /build/ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
        try_files   $uri =404;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive Laravel files
    location ~ ^/(\.env|artisan|composer\.(json|lock)|package\.json) {
        deny all;
        return 404;
    }
}
