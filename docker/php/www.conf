; =============================================================================
; Lensio CRM — PHP-FPM Pool Configuration
; =============================================================================

[www]
user  = www-data
group = www-data

; Listen on TCP (Nginx in same container connects to 127.0.0.1:9000)
listen = 127.0.0.1:9000

; Process management
pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests      = 500

; Logging
access.log           = /dev/null
php_admin_value[error_log]  = /dev/stderr
php_admin_flag[log_errors]  = on

; Timeouts
request_terminate_timeout = 120s

; Environment passthrough
clear_env = no
